<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FC 2026 Tournament – The Revenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;0,900;1,800;1,900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{cursor:pointer;border:none;background:none;font:inherit}
img{display:block}
ul{list-style:none}
input{font:inherit}

/* ── Tokens ── */
:root{
  --bg-void:#080a0f;
  --bg-surface:#0f1318;
  --bg-raised:#161b23;
  --bg-input:#0c1015;
  --green-deep:#0d3320;
  --green-mid:#1a6640;
  --green-bright:#00e676;
  --green-glow:rgba(0,230,118,.15);
  --blue-neon:#00b4ff;
  --blue-glow:rgba(0,180,255,.15);
  --purple:#a855f7;
  --purple-glow:rgba(168,85,247,.2);
  --gold:#ffd700;
  --gold-dim:#b8860b;
  --gold-glow:rgba(255,215,0,.2);
  --silver:#c0c0c0;
  --bronze:#cd7f32;
  --text-primary:#f0f4f8;
  --text-secondary:#7a9ab5;
  --text-muted:#3a5068;
  --win:#00e676;
  --loss:#ff4d4d;
  --draw:#00b4ff;
  --border-subtle:rgba(255,255,255,.06);
  --border-mid:rgba(255,255,255,.12);
  --r:10px;
  --r-sm:6px;
}

/* ── Base ── */
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg-void);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
}
.headline{font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.condensed{font-family:'Barlow Condensed',sans-serif}

/* ── Screen toggling ── */
.screen{display:none}
body[data-screen="setup"] #screen-setup{display:flex}
body[data-screen="tournament"] #screen-tournament{display:flex;flex-direction:column;min-height:100vh}

/* ════════════════════════════
   SETUP SCREEN
════════════════════════════ */
#screen-setup{
  min-height:100vh;
  flex-direction:column;
  align-items:center;
  padding:40px 20px 60px;
}
.setup-hero{
  text-align:center;
  margin-bottom:40px;
}
.setup-hero h1{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-style:italic;
  font-size:clamp(2.4rem,8vw,4.5rem);
  text-transform:uppercase;
  letter-spacing:.04em;
  background:linear-gradient(135deg,#fff 0%,var(--blue-neon) 50%,var(--green-bright) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
  margin-bottom:6px;
}
.setup-hero .subtitle{
  color:var(--text-secondary);
  font-size:.9rem;
  letter-spacing:.1em;
  text-transform:uppercase;
}
.setup-panel{
  width:100%;
  max-width:660px;
  margin:0 auto;
}
.section-label{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:.8rem;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--text-muted);
  margin-bottom:12px;
}
#player-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}

/* Player card */
.player-card{
  background:var(--bg-surface);
  border:1px solid var(--border-subtle);
  border-radius:var(--r);
  padding:14px 16px;
  display:grid;
  grid-template-columns:28px 44px 1fr auto 36px;
  align-items:center;
  gap:12px;
  transition:border-color .2s;
}
.player-card:focus-within{border-color:var(--border-mid)}
.player-num{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:1.3rem;
  color:var(--text-muted);
}
.flag-preview{
  width:44px;height:30px;
  border-radius:4px;
  overflow:hidden;
  background:var(--bg-raised);
  display:flex;align-items:center;justify-content:center;
}
.flag-preview img{width:100%;height:100%;object-fit:cover}
.player-name-input{
  background:var(--bg-input);
  border:1px solid var(--border-subtle);
  border-radius:var(--r-sm);
  padding:9px 12px;
  color:var(--text-primary);
  font-size:.95rem;
  outline:none;
  transition:border-color .2s;
  width:100%;
}
.player-name-input:focus{border-color:var(--blue-neon)}
.player-name-input.error{border-color:var(--loss);animation:shake .3s ease}
.btn-remove{
  width:32px;height:32px;
  border-radius:50%;
  color:var(--text-muted);
  font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  transition:color .2s,background .2s;
}
.btn-remove:hover{color:var(--loss);background:rgba(255,77,77,.1)}
.btn-remove:disabled{opacity:.3;pointer-events:none}

/* Nationality selector */
.nat-selector{position:relative}
.nat-toggle{
  display:flex;align-items:center;gap:8px;
  background:var(--bg-input);
  border:1px solid var(--border-subtle);
  border-radius:var(--r-sm);
  padding:8px 12px;
  color:var(--text-primary);
  font-size:.9rem;
  white-space:nowrap;
  transition:border-color .2s;
  width:100%;
}
.nat-toggle:hover{border-color:var(--border-mid)}
.nat-toggle.open{border-color:var(--blue-neon)}
.nat-toggle.error{border-color:var(--loss);animation:shake .3s ease}
.nat-flag-sm{width:24px;height:16px;border-radius:2px;object-fit:cover;flex-shrink:0}
.nat-name-label{overflow:hidden;text-overflow:ellipsis;color:var(--text-secondary);max-width:120px}
.nat-name-label.selected{color:var(--text-primary)}
.nat-chevron{margin-left:auto;color:var(--text-muted);font-size:.7rem;transition:transform .2s}
.nat-toggle.open .nat-chevron{transform:rotate(180deg)}

.nat-dropdown{
  position:absolute;
  top:calc(100% + 6px);
  left:0;right:0;
  background:var(--bg-raised);
  border:1px solid var(--border-mid);
  border-radius:var(--r);
  z-index:200;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  display:none;
  flex-direction:column;
  max-height:280px;
}
.nat-dropdown.open{display:flex}
.nat-search-input{
  background:var(--bg-input);
  border:none;
  border-bottom:1px solid var(--border-subtle);
  border-radius:var(--r) var(--r) 0 0;
  padding:10px 14px;
  color:var(--text-primary);
  font-size:.9rem;
  outline:none;
  flex-shrink:0;
}
.nat-list{overflow-y:auto;max-height:230px}
.nat-list li{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;
  cursor:pointer;
  font-size:.9rem;
  transition:background .15s;
}
.nat-list li:hover,.nat-list li.highlighted{background:var(--bg-surface)}
.nat-list li img{width:24px;height:16px;border-radius:2px;object-fit:cover;flex-shrink:0}
.nat-list .divider{
  padding:6px 14px 4px;
  font-size:.72rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--text-muted);
  border-top:1px solid var(--border-subtle);
  cursor:default;
  background:none;
}
.nat-list .divider:hover{background:none}

/* Setup actions */
.setup-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-add{
  background:var(--bg-surface);
  border:1px solid var(--border-mid);
  border-radius:var(--r-sm);
  padding:10px 18px;
  color:var(--text-secondary);
  font-size:.9rem;
  font-weight:500;
  transition:border-color .2s,color .2s;
}
.btn-add:hover{border-color:var(--blue-neon);color:var(--blue-neon)}
.btn-add:disabled{opacity:.35;pointer-events:none}
.btn-generate{
  flex:1;
  background:linear-gradient(135deg,var(--blue-neon),var(--green-bright));
  border-radius:var(--r-sm);
  padding:12px 28px;
  color:#000;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:1.1rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  transition:opacity .2s,transform .1s;
}
.btn-generate:hover{opacity:.9}
.btn-generate:active{transform:scale(.98)}
.player-count-note{
  margin-top:10px;
  font-size:.8rem;
  color:var(--text-muted);
}
.player-count-note.warn{color:#ffb74d}

/* ════════════════════════════
   TOURNAMENT SCREEN
════════════════════════════ */
.tourney-header{
  background:linear-gradient(135deg,#080a0f 0%,#0d1f2d 50%,#0a1a10 100%);
  border-bottom:1px solid var(--border-subtle);
  padding:20px 24px 0;
  position:relative;
}
.tourney-header-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
  gap:12px;
}
.tourney-title{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-style:italic;
  font-size:clamp(1.4rem,4vw,2.2rem);
  text-transform:uppercase;
  background:linear-gradient(90deg,#fff,var(--blue-neon));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-history{
  position:relative;
  background:var(--bg-raised);
  border:1px solid var(--border-subtle);
  border-radius:var(--r-sm);
  padding:8px 12px;
  color:var(--text-secondary);
  font-size:.85rem;
  display:flex;align-items:center;gap:6px;
  transition:border-color .2s,color .2s;
}
.btn-history:hover{border-color:var(--blue-neon);color:var(--blue-neon)}
.save-badge{
  background:var(--blue-neon);
  color:#000;
  border-radius:10px;
  padding:1px 6px;
  font-size:.7rem;
  font-weight:600;
  min-width:18px;
  text-align:center;
}
.btn-new-tournament{
  background:var(--bg-raised);
  border:1px solid var(--border-subtle);
  border-radius:var(--r-sm);
  padding:8px 12px;
  color:var(--text-muted);
  font-size:.85rem;
  transition:border-color .2s,color .2s;
}
.btn-new-tournament:hover{border-color:var(--loss);color:var(--loss)}
.btn-pdf{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;
  letter-spacing:.06em;text-transform:uppercase;
  padding:6px 14px;border-radius:var(--r-sm);
  background:var(--bg-raised);border:1px solid var(--blue-neon);
  color:var(--blue-neon);transition:background .2s;
}
.btn-pdf:hover{background:var(--blue-glow)}

/* Tab bar */
.tab-bar{display:flex;gap:4px}
.tab-btn{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:1rem;
  letter-spacing:.06em;
  text-transform:uppercase;
  padding:10px 18px;
  color:var(--text-muted);
  border-radius:var(--r-sm) var(--r-sm) 0 0;
  border:1px solid transparent;
  border-bottom:none;
  transition:color .2s,border-color .2s;
  position:relative;
}
.tab-btn::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;height:2px;
  background:transparent;
  transition:background .2s;
}
.tab-btn.active{color:var(--blue-neon);border-color:var(--border-subtle);}
.tab-btn.active::after{background:var(--blue-neon);box-shadow:0 0 8px var(--blue-glow)}
.tab-btn:hover:not(.active){color:var(--text-secondary)}

/* Tab panels */
.tab-panel{display:none;padding:24px;flex:1}
.tab-panel.active{display:block}

/* ── Schedule tab ── */
.round-block{margin-bottom:32px}
.round-heading{
  display:flex;align-items:center;gap:12px;
  margin-bottom:14px;
}
.round-label{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:1.4rem;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--text-secondary);
}
.round-progress{
  font-size:.8rem;
  color:var(--text-muted);
  margin-left:auto;
}
.round-complete-badge{
  background:var(--green-deep);
  border:1px solid var(--green-mid);
  color:var(--green-bright);
  border-radius:20px;
  padding:2px 10px;
  font-size:.75rem;
  font-weight:600;
}

.game-row{
  background:var(--bg-surface);
  border:1px solid var(--border-subtle);
  border-radius:var(--r);
  margin-bottom:8px;
  padding:12px 16px;
  display:grid;
  grid-template-columns:auto 1fr auto 1fr;
  align-items:center;
  gap:12px;
  transition:border-color .15s,box-shadow .15s;
  position:relative;
}
.game-row:hover{border-color:var(--border-mid);box-shadow:0 0 16px var(--blue-glow)}
.game-row.locked{opacity:.32;pointer-events:none}
.game-row.confirmed{
  border-left:3px solid var(--green-bright);
  box-shadow:inset 4px 0 12px var(--green-glow);
}
.game-row.confirmed.ot-game{
  border-right:3px solid var(--purple);
  box-shadow:inset 4px 0 12px var(--green-glow),inset -4px 0 12px var(--purple-glow);
}
.game-row.unconfirmed.ot-game{
  border-right:3px solid var(--purple);
  box-shadow:inset -4px 0 12px var(--purple-glow);
}

.team{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.team-a{justify-content:flex-end}
.team-b{justify-content:flex-start}
.player-inline{display:flex;align-items:center;gap:5px}
.pair-dash{color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9em}
.pair-sep{color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.4rem;margin:0 2px;line-height:1}
.pair-flag{height:26px;width:38px;border-radius:2px;object-fit:cover;flex-shrink:0}
.pair-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:1.5rem;
  text-transform:uppercase;
  letter-spacing:.03em;
  white-space:nowrap;
}

/* Score control */
.score-ctrl{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  min-width:100px;
}
.game-num-label{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  color:var(--text-muted);
  letter-spacing:.06em;
  text-transform:uppercase;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1.1;
  font-size:.6rem;
}
.game-num-n{
  font-size:1.3rem;
  font-weight:900;
  line-height:1;
  color:var(--text-secondary);
}
.ot-badge{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:.75rem;
  letter-spacing:.1em;
  padding:2px 8px;
  border-radius:12px;
  border:1px solid var(--border-subtle);
  color:var(--text-muted);
  cursor:pointer;
  transition:all .2s;
  user-select:none;
}
.ot-badge:hover{border-color:var(--purple);color:var(--purple)}
.ot-badge.active{
  border-color:var(--purple);
  color:var(--purple);
  background:var(--purple-glow);
  box-shadow:0 0 10px var(--purple-glow);
}
.score-row{display:flex;align-items:center;gap:2px}
.s-btn{
  width:36px;height:36px;
  border-radius:50%;
  background:var(--bg-raised);
  border:1px solid var(--border-subtle);
  color:var(--text-secondary);
  font-size:1.1rem;
  font-weight:600;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
  user-select:none;
}
.s-btn:hover{
  background:var(--blue-neon);
  color:#000;
  border-color:var(--blue-neon);
  box-shadow:0 0 12px var(--blue-glow);
}
.s-btn:disabled{opacity:.3;pointer-events:none}
.s-val{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:2rem;
  min-width:2ch;
  text-align:center;
  line-height:1;
}
.s-sep{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:2rem;
  color:var(--text-muted);
  padding:0 4px;
  line-height:1;
  background:none;
  border:none;
  cursor:default;
  transition:color .15s,text-shadow .15s;
}
.s-sep.confirmmable{cursor:pointer}
.s-sep.confirmmable:hover{color:var(--green-bright);text-shadow:0 0 12px var(--green-glow)}
.status-dot{width:8px;height:8px;border-radius:50%;margin:0 auto}
.status-dot.confirmed{background:var(--green-bright);box-shadow:0 0 6px var(--green-bright)}
.status-dot.unconfirmed{background:var(--text-muted)}

@keyframes scoreFlash{
  0%{color:var(--blue-neon);text-shadow:0 0 20px var(--blue-glow);transform:scale(1.4)}
  100%{color:var(--text-primary);text-shadow:none;transform:scale(1)}
}
.s-val.flash{animation:scoreFlash .3s ease-out}

/* Next round / Final scores */
.next-round-wrap{
  display:none;
  text-align:center;
  padding:24px 0 8px;
}
.next-round-wrap.visible{display:block}
.btn-final-scores{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:1rem;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--green-bright);
  background:transparent;
  border:2px solid var(--green-bright);
  border-radius:var(--r);
  padding:10px 28px;
  display:block;
  margin:0 auto 12px;
  transition:all .2s;
  box-shadow:0 0 10px var(--green-glow);
}
.btn-final-scores:hover{background:var(--green-glow);box-shadow:0 0 20px var(--green-glow)}
.btn-next-round{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:1.2rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  background:linear-gradient(135deg,var(--purple),var(--blue-neon));
  color:#fff;
  border-radius:var(--r-sm);
  padding:14px 36px;
  transition:opacity .2s,transform .1s;
  box-shadow:0 0 24px var(--blue-glow);
}
.btn-next-round:hover{opacity:.9}
.btn-next-round:active{transform:scale(.97)}

/* ── Table tab ── */
#tab-table{overflow-x:auto}
.standings-table{
  width:100%;
  border-collapse:collapse;
  font-size:.9rem;
}
.standings-table thead th{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:.8rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--text-muted);
  padding:10px 12px;
  text-align:right;
  border-bottom:1px solid var(--border-subtle);
  position:sticky;top:0;
  background:rgba(8,10,15,.9);
  backdrop-filter:blur(8px);
}
.standings-table thead th:first-child,
.standings-table thead th:nth-child(2),
.standings-table thead th:nth-child(3){text-align:left}
.standings-table tbody tr{
  border-bottom:1px solid var(--border-subtle);
  transition:background .15s;
}
.standings-table tbody tr:hover{background:var(--bg-raised)}
.standings-table tbody tr:nth-child(even){background:rgba(255,255,255,.02)}
.standings-table tbody tr:nth-child(even):hover{background:var(--bg-raised)}
.standings-table td{padding:10px 12px;text-align:right;vertical-align:middle}
.standings-table td:first-child,
.standings-table td:nth-child(2),
.standings-table td:nth-child(3){text-align:left}
.rank-cell{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:1.4rem;
  color:var(--text-muted);
  width:40px;
}
.rank-1 .rank-cell{color:var(--gold)}
.rank-2 .rank-cell{color:var(--silver)}
.rank-3 .rank-cell{color:var(--bronze)}
.rank-1{box-shadow:inset 4px 0 16px var(--gold-glow)}
.table-flag{width:24px;height:16px;border-radius:2px;object-fit:cover}
.table-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:1rem;
  text-transform:uppercase;
  letter-spacing:.03em;
}
.pts-cell{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:1.1rem;
  color:var(--green-bright);
}

/* Leader panel */
#leader-panel{margin-bottom:12px}
.leader-card{
  display:flex;
  align-items:center;
  gap:18px;
  padding:14px 20px;
  background:var(--bg-surface);
  border:1px solid var(--border-subtle);
  border-radius:10px;
}
.leader-flag-circle{
  width:58px;height:58px;
  border-radius:50%;
  border:2.5px solid var(--green-bright);
  box-shadow:0 0 10px rgba(0,230,118,.35);
  overflow:hidden;
  flex-shrink:0;
  position:relative;
}
.leader-flag-circle img{width:100%;height:100%;object-fit:cover;display:block}
.leader-flag-circle::after{
  content:'';
  position:absolute;top:0;left:50%;transform:translate(-50%,-50%);
  width:9px;height:9px;border-radius:50%;
  background:var(--green-bright);
  box-shadow:0 0 6px var(--green-bright);
}
.leader-info{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.leader-label{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:.68rem;
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--green-bright);line-height:1;
}
.leader-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;font-style:italic;
  font-size:2.3rem;text-transform:uppercase;
  letter-spacing:.02em;color:var(--text-primary);
  line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.leader-stats-line{
  font-family:'JetBrains Mono',monospace;
  font-size:.7rem;color:var(--text-muted);
  margin-top:3px;white-space:nowrap;
}
.leader-pts-block{
  display:flex;flex-direction:column;align-items:center;
  flex-shrink:0;gap:0;
}
.leader-pts{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;font-style:italic;
  font-size:3.6rem;color:var(--green-bright);
  line-height:1;
}
.leader-pts-label{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:.65rem;
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--text-muted);line-height:1;
}
/* Podium */
.podium-wrap{margin-bottom:16px;padding:4px 0 0}
.podium-stage{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:3px;
}
.podium-slot{
  display:flex;flex-direction:column;align-items:center;
  flex:1;max-width:160px;
}
.podium-player{
  display:flex;flex-direction:column;align-items:center;
  gap:5px;padding-bottom:10px;width:100%;
}
.trophy-img{
  width:68px;height:auto;display:block;margin:0 auto 2px;
  filter:brightness(2) sepia(.35) saturate(3) hue-rotate(-10deg)
         drop-shadow(0 0 18px rgba(255,215,0,.55));
}
.podium-flag{width:32px;height:22px;border-radius:3px;object-fit:cover}
.podium-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;font-size:1.1rem;
  text-transform:uppercase;letter-spacing:.04em;
  line-height:1;text-align:center;
}
.gold-name{color:var(--gold)}
.silver-name{color:var(--silver)}
.bronze-name{color:var(--bronze)}
.podium-pts{
  font-family:'JetBrains Mono',monospace;
  font-size:.68rem;color:var(--text-muted);line-height:1;
}
.podium-block{
  width:100%;display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;font-style:italic;line-height:1;
  border-radius:4px 4px 0 0;
}
.gold-block{
  height:80px;font-size:2.4rem;color:var(--gold);
  background:linear-gradient(180deg,#1e1600,#0e0a00);
  border-top:2px solid var(--gold-dim);
  box-shadow:0 -6px 24px rgba(255,215,0,.2);
}
.silver-block{
  height:56px;font-size:2rem;color:var(--silver);
  background:linear-gradient(180deg,#181820,#0d0d14);
  border-top:2px solid #777;
}
.bronze-block{
  height:40px;font-size:1.8rem;color:var(--bronze);
  background:linear-gradient(180deg,#1a1008,#0e0804);
  border-top:2px solid #8b5e3c;
}
.gd-pos{color:var(--win)}
.gd-neg{color:var(--loss)}

/* ── Stats tab ── */
#tab-stats{overflow-x:auto}
.stats-empty{
  text-align:center;
  padding:60px 20px;
  color:var(--text-muted);
  font-size:.9rem;
}
.stats-section{margin-bottom:36px}
.stats-section-title{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:1.2rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--text-secondary);
  margin-bottom:14px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border-subtle);
}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:8px}
.stat-card{
  background:var(--bg-surface);
  border:1px solid var(--border-subtle);
  border-radius:var(--r);
  padding:16px;
  display:flex;flex-direction:column;gap:4px;
}
.stat-card-val{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:2.2rem;
  color:var(--blue-neon);
  line-height:1;
}
.stat-card-label{font-size:.78rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
.stat-card-sub{font-size:.8rem;color:var(--text-secondary)}

/* Leaderboard */
.leaderboard{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.lb-title{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:.95rem;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--text-secondary);
  padding:10px 14px;
  border-bottom:1px solid var(--border-subtle);
  background:var(--bg-raised);
}
.lb-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;
  border-bottom:1px solid var(--border-subtle);
}
.lb-row:last-child{border-bottom:none}
.lb-rank{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:1.1rem;
  color:var(--text-muted);
  width:22px;flex-shrink:0;
}
.lb-row:first-child .lb-rank{color:var(--gold)}
.lb-flag{width:22px;height:15px;border-radius:2px;object-fit:cover;flex-shrink:0}
.lb-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:.95rem;
  text-transform:uppercase;
  flex:1;
}
.lb-val{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:1.1rem;
  color:var(--text-primary);
}
.lb-bar-wrap{width:80px;background:var(--bg-input);border-radius:2px;height:4px;flex-shrink:0}
.lb-bar{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--blue-neon),var(--purple))}

/* Leaderboard grid */
.lb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

/* Matrix */
.matrix-wrap{overflow-x:auto}
.matrix-table{border-collapse:collapse;font-size:.8rem}
.matrix-table th,.matrix-table td{
  padding:7px 10px;
  text-align:center;
  border:1px solid var(--border-subtle);
  white-space:nowrap;
}
.matrix-table th{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  text-transform:uppercase;
  color:var(--text-secondary);
  background:var(--bg-raised);
}
.matrix-table td.self{background:var(--bg-void);color:var(--text-muted)}
.matrix-cell{border-radius:4px;padding:4px 6px;font-weight:600}
.mc-great{background:rgba(0,230,118,.2);color:var(--green-bright)}
.mc-good{background:rgba(0,230,118,.1);color:#6ee7b7}
.mc-neutral{color:var(--text-secondary)}
.mc-bad{background:rgba(255,77,77,.1);color:#fca5a5}
.mc-terrible{background:rgba(255,77,77,.2);color:var(--loss)}

/* H2H matrix */
.mc-h2h-win{background:rgba(0,230,118,.15);color:var(--green-bright)}
.mc-h2h-loss{background:rgba(255,77,77,.15);color:var(--loss)}
.mc-h2h-even{color:var(--text-secondary)}

/* Awards */
.awards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.award-card{
  background:var(--bg-surface);
  border:1px solid var(--border-subtle);
  border-radius:var(--r);
  padding:16px;
  transition:border-color .2s;
}
.award-card.gold-award{
  background:linear-gradient(135deg,#1a1500,#2a2200);
  border-color:var(--gold-dim);
  box-shadow:0 0 16px var(--gold-glow);
}
.award-card.blue-award{
  background:linear-gradient(135deg,#0a0d1a,#141a2a);
  border-color:rgba(0,180,255,.3);
  box-shadow:0 0 12px var(--blue-glow);
}
.award-card.purple-award{
  background:linear-gradient(135deg,#110a1a,#1a1028);
  border-color:rgba(168,85,247,.3);
  box-shadow:0 0 12px var(--purple-glow);
}
.award-card.red-award{
  background:linear-gradient(135deg,#1a0a0a,#2a1010);
  border-color:rgba(255,77,77,.3);
}
.award-icon{font-size:1.6rem;margin-bottom:8px}
.award-title{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:1rem;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--text-secondary);
  margin-bottom:8px;
}
.award-player{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.award-player img{width:28px;height:19px;border-radius:2px;object-fit:cover}
.award-player-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:1.2rem;
  text-transform:uppercase;
}
.award-desc{font-size:.78rem;color:var(--text-muted)}

/* Current Form (table tab) */
.form-row{display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px solid var(--border-subtle)}
.form-flag{height:18px;width:26px;border-radius:2px;object-fit:cover;flex-shrink:0}
.form-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:1.05rem;
  text-transform:uppercase;letter-spacing:.03em;
  min-width:70px;
}
.form-dots{display:flex;gap:3px;flex:1}
.form-dot{
  width:20px;height:20px;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.72rem;
}
.form-dot.W{background:rgba(0,230,118,.2);color:var(--win)}
.form-dot.D{background:rgba(0,180,255,.15);color:var(--draw)}
.form-dot.L{background:rgba(255,77,77,.2);color:var(--loss)}
.form-dot.empty{background:var(--bg-raised)}
.form-streak{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;min-width:72px;text-align:right;white-space:nowrap}

/* OT section hidden until OT games exist */
#stats-ot-section{display:none}

/* Partnership rows */
.partner-row{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;
  border-bottom:1px solid var(--border-subtle);
}
.partner-row:last-child{border-bottom:none}
.partner-flags{display:flex;gap:3px}
.partner-names{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:.95rem;
  text-transform:uppercase;
  flex:1;
}

/* ── Save/Load History Panel ── */
#history-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  z-index:500;
  display:none;
}
#history-overlay.open{display:block}
#history-panel{
  position:fixed;
  top:0;right:0;bottom:0;
  width:min(380px,100vw);
  background:var(--bg-surface);
  border-left:1px solid var(--border-mid);
  z-index:501;
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .25s ease;
}
#history-panel.open{transform:translateX(0)}
.history-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border-subtle);
  flex-shrink:0;
}
.history-header h2{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:1.3rem;
  text-transform:uppercase;
  letter-spacing:.06em;
}
.btn-close-history{
  color:var(--text-muted);
  font-size:1.2rem;
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  transition:background .2s,color .2s;
}
.btn-close-history:hover{background:var(--bg-raised);color:var(--text-primary)}
.history-list{flex:1;overflow-y:auto;padding:12px}
.history-empty{
  text-align:center;
  padding:40px 20px;
  color:var(--text-muted);
  font-size:.85rem;
}
.save-item{
  background:var(--bg-raised);
  border:1px solid var(--border-subtle);
  border-radius:var(--r-sm);
  padding:12px 14px;
  margin-bottom:8px;
  display:flex;flex-direction:column;gap:8px;
}
.save-item.current-save{border-color:var(--green-mid);box-shadow:inset 3px 0 8px var(--green-glow)}
.save-item-header{display:flex;align-items:center;gap:8px}
.save-key{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:.95rem;
  flex:1;
  color:var(--blue-neon);
}
.save-time{font-size:.75rem;color:var(--text-muted)}
.save-players{display:flex;gap:4px;flex-wrap:wrap}
.save-player-chip{
  display:flex;align-items:center;gap:4px;
  background:var(--bg-surface);
  border-radius:10px;
  padding:2px 6px;
  font-size:.72rem;
  color:var(--text-secondary);
}
.save-player-chip img{width:14px;height:10px;border-radius:1px;object-fit:cover}
.save-actions{display:flex;gap:6px;justify-content:flex-end}
.btn-load-save{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:.85rem;
  text-transform:uppercase;
  letter-spacing:.05em;
  background:linear-gradient(135deg,var(--blue-neon),var(--purple));
  color:#fff;
  border-radius:var(--r-sm);
  padding:5px 12px;
  transition:opacity .2s;
}
.btn-load-save:hover{opacity:.85}
.btn-delete-save{
  color:var(--text-muted);
  font-size:.8rem;
  padding:5px 8px;
  border-radius:var(--r-sm);
  transition:color .2s,background .2s;
}
.btn-delete-save:hover{color:var(--loss);background:rgba(255,77,77,.1)}
.history-footer{
  padding:14px 20px;
  border-top:1px solid var(--border-subtle);
  flex-shrink:0;
}
.btn-clear-saves{
  width:100%;
  color:var(--text-muted);
  font-size:.8rem;
  padding:8px;
  border:1px solid var(--border-subtle);
  border-radius:var(--r-sm);
  transition:all .2s;
}
.btn-clear-saves:hover{border-color:var(--loss);color:var(--loss)}
.btn-delete-all-saves{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:.75rem;
  text-transform:uppercase;letter-spacing:.06em;
  color:var(--loss);
  border:1px solid rgba(255,77,77,.35);
  border-radius:var(--r-sm);
  padding:4px 10px;
  transition:all .2s;
}
.btn-delete-all-saves:hover{background:rgba(255,77,77,.12);border-color:var(--loss)}

/* ── Animations & Utils ── */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  75%{transform:translateX(6px)}
}
.hidden{display:none!important}

/* ── Responsive ── */
@media(max-width:640px){
  .tourney-header{padding:16px 16px 0}
  .tab-panel{padding:16px}
  .game-row{grid-template-columns:auto 1fr auto 1fr;gap:6px;padding:10px 10px}
  .pair-name{font-size:1.1rem}
  .score-ctrl{align-items:center}
  .player-card{grid-template-columns:24px 1fr 1.5fr 28px}
  .flag-preview{display:none}
  .nat-flag-sm{width:30px;height:20px}
  .nat-name-label{font-size:.75rem;max-width:100px}
}
@media(max-width:480px){
  .player-card{grid-template-columns:20px 1fr 1.4fr 24px;gap:6px}
  .nat-name-label{max-width:75px}
}

/* ── Print / PDF ── */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  @page{margin:.5in;size:A4}

  /* Show only the tournament screen content */
  #screen-setup{display:none!important}
  #screen-tournament{display:block!important}

  /* Show all three tab panels stacked */
  .tab-panel{display:block!important;padding:0!important}

  /* Section titles injected via ::before */
  #tab-schedule::before{content:'Schedule';display:block;
    font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.6rem;
    text-transform:uppercase;letter-spacing:.08em;color:var(--blue-neon);
    border-bottom:1px solid var(--border-subtle);padding-bottom:6px;margin-bottom:14px}
  #tab-table::before{content:'Standings';display:block;
    font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.6rem;
    text-transform:uppercase;letter-spacing:.08em;color:var(--blue-neon);
    border-bottom:1px solid var(--border-subtle);padding-bottom:6px;margin-bottom:14px}
  #tab-stats::before{content:'Statistics';display:block;
    font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.6rem;
    text-transform:uppercase;letter-spacing:.08em;color:var(--blue-neon);
    border-bottom:1px solid var(--border-subtle);padding-bottom:6px;margin-bottom:14px}

  /* Reorder sections: Table → Schedule → Stats */
  #screen-tournament{display:flex;flex-direction:column}
  #tab-table{order:1}
  #tab-schedule{order:2;break-before:page}
  #tab-stats{order:3;break-before:page}

  /* Hide all interactive & nav chrome */
  .tourney-header,.tab-bar,.s-btn,#next-round-wrap,
  .btn-history,.btn-new-tournament,.btn-pdf,.btn-load-save,.btn-del-save,
  .history-panel,.history-overlay,.status-dot,.nat-dropdown,
  .btn-remove,.setup-actions,.game-num-label{display:none!important}

  /* Keep the OT badge visible but non-clickable looking */
  .ot-badge{pointer-events:none}

  /* Game rows: tighten up */
  .game-row{padding:8px 10px;margin-bottom:4px;break-inside:avoid;grid-template-columns:1fr auto 1fr}
  .round-block{break-inside:avoid;margin-bottom:16px}
  .round-heading{margin-bottom:8px}

  /* Scores: hide +/- buttons, keep values */
  .score-ctrl{gap:2px}
  .score-row{gap:4px}

  /* Keep pair names readable */
  .pair-name{font-size:1.1rem}
  .pair-flag{height:20px;width:29px}

  /* Table */
  .standings-table thead th{position:static;backdrop-filter:none;background:var(--bg-surface)}
  .standings-table td,.standings-table th{padding:7px 10px}

  /* Stats: avoid orphaned cards */
  .stat-section{break-inside:avoid}
  .award-card,.stat-card,.leaderboard-item{break-inside:avoid}

  /* Podium */
  .podium-wrap{break-inside:avoid}

  /* Matrix tables can overflow pages */
  .matrix-wrap{break-inside:auto}
}
</style>
</head>

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
const BLANK_IMG='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12NgAAIABQAABjE+ibYAAAAASUVORK5CYII=';
function flagSrc(code){return code?`w320/${code.toLowerCase()}.png`:BLANK_IMG;}
function playerById(id){return STATE.players.find(p=>p.id===id)||{};}
function playerName(id){return playerById(id).name||'?';}
function pairKey(a,b){return [a,b].sort().join('|');}
function uid(){return Math.random().toString(36).slice(2,10);}
function fmtTime(ms){
  const d=new Date(ms);
  const pad=n=>String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/* ════════════════════════════════════════
   SCHEDULE GENERATION
════════════════════════════════════════ */
function combinations(arr,k){
  const res=[];
  (function recurse(start,combo){
    if(combo.length===k){res.push([...combo]);return;}
    for(let i=start;i<arr.length;i++){combo.push(arr[i]);recurse(i+1,combo);combo.pop();}
  })(0,[]);
  return res;
}

function generateSchedule(round){
  const ids=STATE.players.map(p=>p.id);
  const rawGames=[];
  const groups=combinations(ids,4);
  for(const [A,B,C,D] of groups){
    rawGames.push({teamA:[A,B],teamB:[C,D]});
    rawGames.push({teamA:[A,C],teamB:[B,D]});
    rawGames.push({teamA:[A,D],teamB:[B,C]});
  }
  const shuffle=arr=>{for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;};

  let ordered;
  if(ids.length===5){
    // 5-player optimised path
    // Group the 15 games by which player sits out (5 buckets × 3 games each)
    const sitOf=g=>ids.find(id=>!g.teamA.includes(id)&&!g.teamB.includes(id));
    const buckets={};
    ids.forEach(id=>{buckets[id]=[];});
    rawGames.forEach(g=>buckets[sitOf(g)].push(g));
    ids.forEach(id=>shuffle(buckets[id])); // randomise matchups within each sit-out slot

    // One shared random sit-out order repeated 3 times:
    //   player k sits out at positions k, k+5, k+10  →  gaps always exactly 5
    //   no consecutive same sit-out guaranteed by construction (all 5 distinct)
    const playerOrder=shuffle([...ids]);
    const bIdx=Object.fromEntries(ids.map(id=>[id,0]));
    ordered=[];
    for(let r=0;r<3;r++) for(const pid of playerOrder) ordered.push(buckets[pid][bIdx[pid]++]);
  } else {
    // Generic path: shuffle + greedy repair
    ordered=shuffle(rawGames);
    const sitOf=g=>ids.filter(id=>!g.teamA.includes(id)&&!g.teamB.includes(id));
    const clashes=(g1,g2)=>sitOf(g1).some(id=>sitOf(g2).includes(id));
    for(let pass=0;pass<2;pass++){
      for(let i=0;i<ordered.length-1;i++){
        if(clashes(ordered[i],ordered[i+1])){
          for(let j=i+2;j<ordered.length;j++){
            if(!clashes(ordered[i],ordered[j])){[ordered[i+1],ordered[j]]=[ordered[j],ordered[i+1]];break;}
          }
        }
      }
    }
  }

  ordered.forEach(g=>{if(Math.random()<.5)[g.teamA,g.teamB]=[g.teamB,g.teamA];});
  return ordered.map((g,i)=>({
    id:`g${round}_${i}_${uid()}`,
    round,
    teamA:g.teamA,
    teamB:g.teamB,
    scoreA:0,
    scoreB:0,
    confirmed:false,
    overtime:false,
    touched:false,
  }));
}

/* ════════════════════════════════════════
   STANDINGS
════════════════════════════════════════ */
function computeStandings(){
  const s={};
  STATE.players.forEach(p=>{s[p.id]={id:p.id,gp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
  STATE.games.forEach(g=>{
    if(!g.confirmed)return;
    const{teamA,teamB,scoreA,scoreB}=g;
    teamA.forEach(pid=>{
      const r=s[pid];r.gp++;r.gf+=scoreA;r.ga+=scoreB;
      if(scoreA>scoreB){r.w++;r.pts+=3;}
      else if(scoreA===scoreB){r.d++;r.pts+=1;}
      else r.l++;
    });
    teamB.forEach(pid=>{
      const r=s[pid];r.gp++;r.gf+=scoreB;r.ga+=scoreA;
      if(scoreB>scoreA){r.w++;r.pts+=3;}
      else if(scoreA===scoreB){r.d++;r.pts+=1;}
      else r.l++;
    });
  });
  return Object.values(s).sort((a,b)=>{
    const gdA=a.gf-a.ga,gdB=b.gf-b.ga;
    return (b.pts-a.pts)||(gdB-gdA)||(b.gf-a.gf)||playerName(a.id).localeCompare(playerName(b.id));
  });
}

/* ════════════════════════════════════════
   STATS COMPUTATION
════════════════════════════════════════ */
function computeStats(){
  const confirmed=STATE.games.filter(g=>g.confirmed);
  const N=confirmed.length;
  const totalGoals=confirmed.reduce((s,g)=>s+g.scoreA+g.scoreB,0);
  const avgGoals=N?+(totalGoals/N).toFixed(2):0;

  // Scoreline frequency
  const scorelineMap={};
  confirmed.forEach(g=>{
    const k=[Math.min(g.scoreA,g.scoreB),Math.max(g.scoreA,g.scoreB)].join('-');
    scorelineMap[k]=(scorelineMap[k]||0)+1;
  });
  let topScoreline='—',topScorelineCount=0;
  Object.entries(scorelineMap).forEach(([k,v])=>{if(v>topScorelineCount){topScoreline=k;topScorelineCount=v;}});

  // Highest scoring game
  let highestGame=null,highestTotal=0;
  confirmed.forEach(g=>{const t=g.scoreA+g.scoreB;if(t>highestTotal){highestTotal=t;highestGame=g;}});

  // Biggest win
  let biggestWin=null,biggestDiff=0;
  confirmed.forEach(g=>{const d=Math.abs(g.scoreA-g.scoreB);if(d>biggestDiff){biggestDiff=d;biggestWin=g;}});

  // Per-player
  const ps={};
  STATE.players.forEach(p=>{
    ps[p.id]={id:p.id,gp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,cleanSheets:0,
              bestSingleGF:0,bestSingleGA:0,bestWinDiff:0,worstLossDiff:0,
              gameResults:[],otGP:0,otW:0,otL:0,otD:0};
  });
  confirmed.forEach(g=>{
    const{teamA,teamB,scoreA,scoreB}=g;
    const process=(team,mineScore,theirScore)=>{
      team.forEach(pid=>{
        const r=ps[pid];
        r.gp++;r.gf+=mineScore;r.ga+=theirScore;
        if(mineScore===0)r.bestSingleGA=Math.max(r.bestSingleGA,theirScore);
        r.bestSingleGF=Math.max(r.bestSingleGF,mineScore);
        if(mineScore>theirScore){r.w++;r.pts+=3;r.bestWinDiff=Math.max(r.bestWinDiff,mineScore-theirScore);r.gameResults.push('W');}
        else if(mineScore===theirScore){r.d++;r.pts+=1;r.gameResults.push('D');}
        else{r.l++;r.worstLossDiff=Math.max(r.worstLossDiff,theirScore-mineScore);r.gameResults.push('L');}
        if(theirScore===0)r.cleanSheets++;
        if(g.overtime){
          r.otGP++;
          if(mineScore>theirScore)r.otW++;
          else if(mineScore===theirScore)r.otD++;
          else r.otL++;
        }
      });
    };
    process(teamA,scoreA,scoreB);
    process(teamB,scoreB,scoreA);
  });

  // Streaks
  const streaks={};
  STATE.players.forEach(p=>{
    const results=ps[p.id].gameResults;
    let cur=0,curType='',longestW=0,longestUnbeaten=0,curUnbeaten=0;
    results.forEach(r=>{
      if(r==='W'){
        cur=(curType==='W'?cur:0)+1;curType='W';curUnbeaten++;
      } else if(r==='D'){
        curUnbeaten++;curType='D';cur=curUnbeaten; // cur = full unbeaten length
      } else {
        cur=(curType==='L'?cur:0)+1;curType='L';curUnbeaten=0;
      }
      if(curType==='W')longestW=Math.max(longestW,cur);
      longestUnbeaten=Math.max(longestUnbeaten,curUnbeaten);
    });
    streaks[p.id]={current:cur,type:curType,longestW,longestUnbeaten};
  });

  // Partnerships
  const partners={};
  confirmed.forEach(g=>{
    [[g.teamA,g.scoreA,g.scoreB],[g.teamB,g.scoreB,g.scoreA]].forEach(([team,mine,theirs])=>{
      if(team.length<2)return;
      const k=pairKey(team[0],team[1]);
      if(!partners[k])partners[k]={gp:0,w:0,d:0,l:0,gf:0,ga:0,otGP:0,otW:0,otL:0};
      const p=partners[k];
      p.gp++;p.gf+=mine;p.ga+=theirs;
      if(mine>theirs){p.w++;if(g.overtime)p.otW++;}
      else if(mine===theirs)p.d++;
      else{p.l++;if(g.overtime)p.otL++;}
      if(g.overtime)p.otGP++;
    });
  });

  // Head-to-head
  const h2h={};
  confirmed.forEach(g=>{
    g.teamA.forEach(aId=>{
      g.teamB.forEach(bId=>{
        const k=pairKey(aId,bId);
        if(!h2h[k])h2h[k]={};
        const aWins=g.scoreA>g.scoreB,bWins=g.scoreB>g.scoreA,draw=g.scoreA===g.scoreB;
        const aKey=`${aId}_vs_${bId}`,bKey=`${bId}_vs_${aId}`;
        if(!h2h[k][aKey])h2h[k][aKey]={w:0,d:0,l:0};
        if(!h2h[k][bKey])h2h[k][bKey]={w:0,d:0,l:0};
        if(aWins){h2h[k][aKey].w++;h2h[k][bKey].l++;}
        else if(bWins){h2h[k][bKey].w++;h2h[k][aKey].l++;}
        else{h2h[k][aKey].d++;h2h[k][bKey].d++;}
      });
    });
  });

  // OT overview
  const otGames=confirmed.filter(g=>g.overtime);

  // Awards
  const pArr=Object.values(ps).filter(p=>p.gp>0);
  function best(arr,fn){if(!arr.length)return null;return arr.reduce((b,c)=>fn(c)>fn(b)?c:b);}
  function worst(arr,fn){if(!arr.length)return null;return arr.reduce((b,c)=>fn(c)<fn(b)?c:b);}
  const minGP3=pArr.filter(p=>p.gp>=3);
  const awards={
    topScorer:best(pArr,p=>p.gf),
    goldenGlove:minGP3.length?best(minGP3,p=>-p.ga/p.gp):null,
    mvp:best(pArr,p=>p.pts),
    liability:best(pArr,p=>p.ga),
    brickWall:best(pArr,p=>p.cleanSheets),
    goalMachine:minGP3.length?best(minGP3,p=>p.gf/p.gp):null,
    unbreakable:best(pArr,p=>streaks[p.id].longestUnbeaten),
    punchingBag:best(pArr,p=>p.l),
    clutchPlayer:null,bottler:null,otMagnet:null,
  };
  if(otGames.length>=2){
    const otP=pArr.filter(p=>ps[p.id].otGP>=2);
    if(otP.length){
      awards.clutchPlayer=best(otP,p=>p.otGP?p.otW/p.otGP:0);
      awards.bottler=worst(otP,p=>p.otGP?p.otW/p.otGP:1);
      awards.otMagnet=best(pArr,p=>p.otGP);
    }
  }

  return{
    overview:{N,totalGoals,avgGoals,topScoreline,topScorelineCount,highestGame,biggestWin,
              draws:confirmed.filter(g=>g.scoreA===g.scoreB).length},
    ps,streaks,partners,h2h,awards,otGames,
  };
}

function renderStandings(){

    const roundGames=STATE.games.filter(g=>g.round===STATE.currentRound);

            <img class="podium-flag" src="${flagSrc(p1.countryCode)}" alt="" onerror="this.style.opacity='0'"/>
            <span class="podium-name gold-name">${p1.name}</span>
            <span class="podium-pts">${r1.pts} pts</span>
          </div>
          <div class="podium-block gold-block">1</div>
        </div>
        <div class="podium-slot">
          <div class="podium-player">
            <img class="podium-flag" src="${flagSrc(p3.countryCode)}" alt="" onerror="this.style.opacity='0'"/>

          <div class="podium-block bronze-block">3</div>
        </div>
      </div></div>`;
    } else {
      const r=rows[0],p=playerById(r.id);
      const gd=r.gf-r.ga;
      const gdStr=gd>0?'+'+gd:String(gd);
      // Unbeaten streak
      const pg=STATE.games.filter(g=>g.confirmed&&(g.teamA.includes(r.id)||g.teamB.includes(r.id)));
      let streak=0;
      for(let i=pg.length-1;i>=0;i--){
        const g=pg[i],inA=g.teamA.includes(r.id);
        if((inA?g.scoreA:g.scoreB)<(inA?g.scoreB:g.scoreA))break;
        streak++;
      }
      const streakStr=streak>1?` · ${streak}-game unbeaten`:'';
      lp.innerHTML=`<div class="leader-card">
        <div class="leader-flag-circle"><img src="${flagSrc(p.countryCode)}" alt="" onerror="this.style.opacity='0'"/></div>
        <div class="leader-info">
          <span class="leader-label">Current Leader</span>
          <span class="leader-name">${p.name}</span>
          <span class="leader-stats-line">${r.w}W · ${r.d}D · ${r.l}L · ${gdStr} GD${streakStr}</span>
        </div>
        <div class="leader-pts-block">
          <span class="leader-pts">${r.pts}</span>
          <span class="leader-pts-label">Points</span>
        </div>
      </div>`;
    }
  }
  const tbody=document.getElementById('standings-tbody');
  tbody.innerHTML='';
  rows.forEach((r,i)=>{
    const p=playerById(r.id);
    const gd=r.gf-r.ga;
    const gdClass=gd>0?'gd-pos':gd<0?'gd-neg':'';
    const tr=document.createElement('tr');
    tr.className=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
    tr.innerHTML=`
      <td class="rank-cell">${i+1}</td>
      <td><img class="table-flag" src="${flagSrc(p.countryCode)}" alt="${p.countryName||''}" onerror="this.style.opacity='0'"/></td>
      <td class="table-name">${p.name}</td>
      <td>${r.gp}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
      <td>${r.gf}</td><td>${r.ga}</td>
      <td class="${gdClass}">${gd>0?'+'+gd:gd}</td>
      <td class="pts-cell">${r.pts}</td>
    `;
    tbody.appendChild(tr);
  });
  renderTableExtras();
}

function awardCard(icon,title,pid,desc,style=''){
  if(!pid)return`<div class="award-card" style="opacity:.4"><div class="award-icon">${icon}</div><div class="award-title">${title}</div><div class="award-desc">Not enough data yet</div></div>`;
  const pl=playerById(pid);
  return`<div class="award-card ${style}">
    <div class="award-icon">${icon}</div>
    <div class="award-title">${title}</div>
    <div class="award-player">
      <img src="${flagSrc(pl.countryCode)}" alt="" onerror="this.style.opacity='0'"/>
      <span class="award-player-name">${pl.name}</span>
    </div>
    <div class="award-desc">${desc}</div>
  </div>`;
}

function renderTableExtras(){
  const el=document.getElementById('table-extras');
  if(!el)return;
  const confirmed=STATE.games.filter(g=>g.confirmed);
  if(confirmed.length===0){el.innerHTML='';return;}

  const standings=computeStandings();
  const {ps,streaks,awards,otGames}=computeStats();

  const formRows=standings.map(r=>{
    const p=playerById(r.id);
    const results=ps[r.id]?.gameResults||[];
    const last10=results.slice(-10);
    const padded=[...Array(Math.max(0,10-last10.length)).fill('empty'),...last10];
    const st=streaks[r.id];
    const col=st?.type==='W'?'var(--win)':st?.type==='L'?'var(--loss)':'var(--draw)';
    const streakLabel=st?.type==='W'?'W streak':st?.type==='L'?'L streak':'game unbeaten';
    const streakStr=st?.current?`${st.current} ${streakLabel}`:'';
    return`<div class="form-row">
      <img class="form-flag" src="${flagSrc(p.countryCode)}" alt="" onerror="this.style.opacity='0'"/>
      <span class="form-name">${p.name}</span>

      ${streakStr?`<span class="form-streak" style="color:${col}">${streakStr}</span>`:'<span class="form-streak"></span>'}
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="stats-section" style="margin-top:24px">
      <div class="stats-section-title">Current Form</div>
      ${formRows}
    </div>
    <div class="stats-section">
      <div class="stats-section-title">Awards</div>
      <div class="awards-grid">
        ${awardCard('⚽','Top Scorer',awards.topScorer?.id,`${awards.topScorer?awards.topScorer.gf:0} goals`,'gold-award')}

        ${awardCard('🏆','MVP',awards.mvp?.id,`${awards.mvp?awards.mvp.pts:0} points`,'gold-award')}
        ${awardCard('📈','Goal Machine',awards.goalMachine?.id,awards.goalMachine?`${(awards.goalMachine.gf/awards.goalMachine.gp).toFixed(2)} goals/game`:'','blue-award')}
        ${awardCard('🧱','Brick Wall',awards.brickWall?.id,`${awards.brickWall?awards.brickWall.cleanSheets:0} clean sheets`,'blue-award')}
        ${awardCard('💎','Unbreakable',awards.unbreakable?.id,awards.unbreakable?`${streaks[awards.unbreakable.id].longestUnbeaten}-game unbeaten streak`:'')}
        ${awardCard('😬','Liability',awards.liability?.id,`${awards.liability?awards.liability.ga:0} goals conceded`,'red-award')}
        ${awardCard('😓','Punching Bag',awards.punchingBag?.id,`${awards.punchingBag?awards.punchingBag.l:0} losses`,'red-award')}
        ${otGames.length>=2&&awards.clutchPlayer?awardCard('⚡','Clutch Player',awards.clutchPlayer?.id,`${Math.round(awards.clutchPlayer.otW/awards.clutchPlayer.otGP*100)}% OT win rate`,'purple-award'):''}
        ${otGames.length>=2&&awards.bottler?awardCard('🫣','Bottler',awards.bottler?.id,`${Math.round(awards.bottler.otW/awards.bottler.otGP*100)}% OT win rate`,'red-award'):''}
        ${otGames.length>=1&&awards.otMagnet?awardCard('🕐','OT Magnet',awards.otMagnet?.id,`${awards.otMagnet?awards.otMagnet.otGP:0} OT games`,'purple-award'):''}

}

function renderStats(){
  const el=document.getElementById('stats-content');
  const confirmed=STATE.games.filter(g=>g.confirmed);
  if(confirmed.length===0){
    el.innerHTML='<div class="stats-empty">Play some games first — stats will appear here.</div>';
    return;
  }
  const{overview,ps,streaks,partners,h2h,awards,otGames}=computeStats();
  const pArr=STATE.players;
  const pList=Object.values(ps).filter(p=>p.gp>0);

  function leaderboard(title,data,valFn,fmtFn,showBar=true){
    if(!data.length)return'';
    const sorted=[...data].sort((a,b)=>valFn(b)-valFn(a));
    const maxVal=valFn(sorted[0])||1;
    return`<div class="leaderboard">
      <div class="lb-title">${title}</div>
      ${sorted.map((p,i)=>{
        const pl=playerById(p.id);
        const val=valFn(p);
        const pct=Math.round((val/maxVal)*100);
        return`<div class="lb-row">
          <span class="lb-rank">${i+1}</span>
          <img class="lb-flag" src="${flagSrc(pl.countryCode)}" alt="" onerror="this.style.opacity='0'"/>
          <span class="lb-name">${pl.name}</span>
          <span class="lb-val">${fmtFn?fmtFn(p,val):val}</span>
          ${showBar?`<div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%"></div></div>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }

  // Partnership leaderboard
  function partnerLB(title,data,valFn,fmtFn){
    if(!data.length)return'';
    const sorted=[...data].sort((a,b)=>valFn(b)-valFn(a));
    const maxVal=valFn(sorted[0])||1;
    return`<div class="leaderboard">
      <div class="lb-title">${title}</div>
      ${sorted.map((item,i)=>{
        const [idA,idB]=item.key.split('|');
        const pA=playerById(idA),pB=playerById(idB);
        const val=valFn(item);
        const pct=Math.round((val/maxVal)*100);
        return`<div class="partner-row">
          <span class="lb-rank">${i+1}</span>
          <div class="partner-flags">
            <img class="lb-flag" src="${flagSrc(pA.countryCode)}" alt="" onerror="this.style.opacity='0'"/>
            <img class="lb-flag" src="${flagSrc(pB.countryCode)}" alt="" onerror="this.style.opacity='0'"/>
          </div>
          <span class="partner-names">${pA.name} &amp; ${pB.name}</span>
          <span class="lb-val">${fmtFn?fmtFn(item,val):val}</span>
          <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // Partnership matrix
  function partnerMatrix(){
    const ids=STATE.players.map(p=>p.id);
    let html=`<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th></th>`;
    ids.forEach(id=>{html+=`<th>${playerById(id).name}</th>`;});
    html+=`</tr></thead><tbody>`;
    ids.forEach(idA=>{
      html+=`<tr><th>${playerById(idA).name}</th>`;
      ids.forEach(idB=>{
        if(idA===idB){html+=`<td class="self">—</td>`;return;}
        const k=pairKey(idA,idB);
        const p=partners[k];
        if(!p||p.gp===0){html+=`<td>—</td>`;return;}
        const wr=p.gp?Math.round((p.w/p.gp)*100):0;
        const cls=wr>=70?'mc-great':wr>=55?'mc-good':wr>=45?'mc-neutral':wr>=30?'mc-bad':'mc-terrible';
        html+=`<td><span class="matrix-cell ${cls}">${wr}%</span></td>`;
      });
      html+=`</tr>`;
    });
    return html+`</tbody></table></div>`;
  }

  // H2H matrix
  function h2hMatrix(){
    const ids=STATE.players.map(p=>p.id);
    let html=`<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th></th>`;
    ids.forEach(id=>{html+=`<th>${playerById(id).name}</th>`;});
    html+=`</tr></thead><tbody>`;
    ids.forEach(idA=>{
      html+=`<tr><th>${playerById(idA).name}</th>`;
      ids.forEach(idB=>{
        if(idA===idB){html+=`<td class="self">—</td>`;return;}
        const k=pairKey(idA,idB);
        const rec=h2h[k]&&h2h[k][`${idA}_vs_${idB}`];
        if(!rec){html+=`<td>—</td>`;return;}
        const cls=rec.w>rec.l?'mc-h2h-win':rec.l>rec.w?'mc-h2h-loss':'mc-h2h-even';
        html+=`<td><span class="matrix-cell ${cls}">${rec.w}–${rec.d}–${rec.l}</span></td>`;
      });
      html+=`</tr>`;
    });
    return html+`</tbody></table></div>`;
  }

  function fmt1(p,v){return v;}
  function fmtPct(p,v){return Math.round(v*100)+'%';}
  function fmtDec1(p,v){return v.toFixed(2);}

  const n=(ids)=>ids.map(id=>playerName(id)).join(' & ');

  // Highest game desc
  let highestGameDesc='—';

  // Partner stats array

  <!-- Overview -->

      <div class="stat-card"><div class="stat-card-val">${overview.topScorelineCount}×</div><div class="stat-card-label">Most Common Score</div><div class="stat-card-sub">${overview.topScoreline}</div></div>
      <div class="stat-card" style="grid-column:span 2"><div class="stat-card-val" style="font-size:1.1rem">${highestGameDesc}</div><div class="stat-card-label">Highest Scoring Game</div></div>
      <div class="stat-card" style="grid-column:span 2"><div class="stat-card-val" style="font-size:1.1rem">${biggestWinDesc}</div><div class="stat-card-label">Biggest Win</div></div>
    </div>

  <!-- Attacking -->
  <div class="stats-section">
    <div class="stats-section-title">Attacking</div>
    <div class="lb-grid">
      ${leaderboard('Total Goals Scored',pList,p=>p.gf,null)}
      ${leaderboard('Goals per Game (min 3 games)',pList.filter(p=>p.gp>=3),p=>+(p.gf/p.gp).toFixed(2),fmtDec1)}
      ${leaderboard('Most Goals in One Game',pList,p=>p.bestSingleGF,null)}
    </div>
  </div>

  <!-- Defensive -->
  <div class="stats-section">

    <div class="lb-grid">
      ${leaderboard('Most Goals Conceded',pList,p=>p.ga,null)}
      ${leaderboard('Fewest GA per Game (min 3 games)',pList.filter(p=>p.gp>=3),p=>-(p.gp?p.ga/p.gp:99),p=>+(p.ga/p.gp).toFixed(2),false)}
      ${leaderboard('Most Clean Sheets',pList,p=>p.cleanSheets,null)}

  <!-- Performance -->
  <div class="stats-section">

   RENDER: GAME ROW

function playerPairHTML(ids,side){
  return ids.map(id=>{
    const p=playerById(id);
    return`<span class="player-inline"><span class="pair-name">${p.name}</span><span class="pair-dash">–</span><img class="pair-flag" src="${flagSrc(p.countryCode)}" alt="" onerror="this.style.opacity='0'"/></span>`;
  }).join(' ');
}

function createGameRow(game,gameNum,totalGames){
  const div=document.createElement('div');
  div.className='game-row'+(game.confirmed?' confirmed':'')+(game.overtime?' ot-game':'');
  div.dataset.gameId=game.id;
  const confirmmable=!game.touched&&!game.confirmed;
  div.innerHTML=`
    <div class="game-num-label"><span class="game-num-n">${gameNum}</span><span>of&nbsp;${totalGames}</span></div>
    <div class="team team-a">${playerPairHTML(game.teamA,'a')}</div>
    <div class="score-ctrl">
      <span class="ot-badge${game.overtime?' active':''}" data-game="${game.id}" data-action="ot">OT</span>
      <div class="score-row">
        <button class="s-btn" data-game="${game.id}" data-side="a" data-delta="-1" ${game.scoreA===0?'disabled':''}>−</button>
        <span class="s-val" data-game="${game.id}" data-side="a">${game.scoreA}</span>
        <button class="s-btn" data-game="${game.id}" data-side="a" data-delta="1">+</button>
        <button class="s-sep${confirmmable?' confirmmable':''}" data-game="${game.id}" data-action="confirm-zero">–</button>
        <button class="s-btn" data-game="${game.id}" data-side="b" data-delta="1">+</button>
        <span class="s-val" data-game="${game.id}" data-side="b">${game.scoreB}</span>
        <button class="s-btn" data-game="${game.id}" data-side="b" data-delta="-1" ${game.scoreB===0?'disabled':''}>−</button>
      </div>
      <div class="status-dot ${game.confirmed?'confirmed':'unconfirmed'}"></div>
    </div>
    <div class="team team-b">${playerPairHTML(game.teamB,'b')}</div>
  `;
  return div;
}

function updateGameRow(gameId){
  const game=STATE.games.find(g=>g.id===gameId);
  if(!game)return;
  const row=document.querySelector(`[data-game-id="${gameId}"]`);
  if(!row)return;
  row.className='game-row'+(game.confirmed?' confirmed':'')+(game.overtime?' ot-game':'');
  // scores
  ['a','b'].forEach(side=>{
    const val=row.querySelector(`.s-val[data-side="${side}"]`);
    const score=side==='a'?game.scoreA:game.scoreB;
    if(val){val.textContent=score;val.classList.add('flash');setTimeout(()=>val.classList.remove('flash'),350);}
    const decBtn=row.querySelector(`.s-btn[data-side="${side}"][data-delta="-1"]`);
    if(decBtn)decBtn.disabled=score===0;
  });
  // status dot
  const dot=row.querySelector('.status-dot');
  if(dot){dot.className='status-dot '+(game.confirmed?'confirmed':'unconfirmed');}
  // s-sep confirmmable
  const sep=row.querySelector('.s-sep');
  if(sep){sep.classList.toggle('confirmmable',!game.confirmed&&!game.touched);}
  // OT badge
  const otBadge=row.querySelector('.ot-badge');
  if(otBadge)otBadge.className='ot-badge'+(game.overtime?' active':'');
}

/* ════════════════════════════════════════
   RENDER: SCHEDULE
════════════════════════════════════════ */
function renderSchedule(){
  const panel=document.getElementById('tab-schedule');
  // Remove all round blocks but keep the next-round wrapper
  panel.querySelectorAll('.round-block').forEach(el=>el.remove());
  const nextWrap=document.getElementById('next-round-wrap');
  for(let r=1;r<=STATE.currentRound;r++){
    const block=buildRoundBlock(r);
    panel.insertBefore(block,nextWrap);
  }
  checkRoundComplete();
}

function updateRoundLocks(round){
  const block=document.querySelector(`.round-block[data-round="${round}"]`);
  if(!block)return;
  applyRoundLocks(block,round);
}

function applyRoundLocks(block,round){
  const roundGames=STATE.games.filter(g=>g.round===round);
  const firstUnconf=roundGames.findIndex(g=>!g.confirmed);
  block.querySelectorAll('.game-row').forEach((row,i)=>{
    row.classList.toggle('locked',firstUnconf>=0&&i>firstUnconf);
  });
}

function buildRoundBlock(round){
  const games=STATE.games.filter(g=>g.round===round);
  const done=games.filter(g=>g.confirmed).length;
  const isComplete=done===games.length&&games.length>0;
  const block=document.createElement('div');
  block.className='round-block';
  block.dataset.round=round;
  block.innerHTML=`<div class="round-heading">
    <span class="round-label">Round ${round}</span>
    <span class="round-progress">${done}/${games.length} played</span>
    ${isComplete?'<span class="round-complete-badge">✓ Complete</span>':''}
  </div>`;
  const frag=document.createDocumentFragment();
  games.forEach((g,i)=>frag.appendChild(createGameRow(g,i+1,games.length)));
  block.appendChild(frag);
  applyRoundLocks(block,round);
  return block;
}

function appendRoundBlock(round){
  const panel=document.getElementById('tab-schedule');
  const nextWrap=document.getElementById('next-round-wrap');
  const block=buildRoundBlock(round);
  panel.insertBefore(block,nextWrap);
  block.scrollIntoView({behavior:'smooth',block:'start'});
}

function updateRoundProgress(round){
  const block=document.querySelector(`.round-block[data-round="${round}"]`);
  if(!block)return;
  const games=STATE.games.filter(g=>g.round===round);
  const done=games.filter(g=>g.confirmed).length;
  const isComplete=done===games.length&&games.length>0;
  const prog=block.querySelector('.round-progress');
  if(prog)prog.textContent=`${done}/${games.length} played`;
  let badge=block.querySelector('.round-complete-badge');
  if(isComplete&&!badge){
    badge=document.createElement('span');
    badge.className='round-complete-badge';
    badge.textContent='✓ Complete';
    block.querySelector('.round-heading').appendChild(badge);
  }
}

/* ════════════════════════════════════════
   ROUND COMPLETE CHECK
════════════════════════════════════════ */
function checkRoundComplete(){
  const roundGames=STATE.games.filter(g=>g.round===STATE.currentRound);
  const allDone=roundGames.length>0&&roundGames.every(g=>g.confirmed);
  const wrap=document.getElementById('next-round-wrap');
  const btn=document.getElementById('btn-next-round');
  wrap.className='next-round-wrap'+(allDone?' visible':'');
  if(btn)btn.textContent=`Start Round ${STATE.currentRound+1}`;
}

/* ════════════════════════════════════════
   SCORE HANDLING
════════════════════════════════════════ */
function handleScore(gameId,side,delta){
  const game=STATE.games.find(g=>g.id===gameId);
  if(!game)return;
  if(side==='a') game.scoreA=Math.max(0,game.scoreA+delta);
  else game.scoreB=Math.max(0,game.scoreB+delta);
  game.confirmed=true;
  game.touched=true;
  updateGameRow(gameId);
  updateRoundProgress(game.round);
  updateRoundLocks(game.round);
  renderStandings();
  renderStats();
  checkRoundComplete();
  saveState(gameId);
}

function handleConfirmZero(gameId){
  const game=STATE.games.find(g=>g.id===gameId);
  if(!game)return;
  game.confirmed=true;
  game.touched=true;
  updateGameRow(gameId);
  updateRoundProgress(game.round);
  updateRoundLocks(game.round);
  renderStandings();
  renderStats();
  checkRoundComplete();
  saveState(gameId);
}

function handleOT(gameId){
  const game=STATE.games.find(g=>g.id===gameId);
  if(!game)return;
  game.overtime=!game.overtime;
  updateGameRow(gameId);
  if(game.confirmed){renderStandings();renderStats();}
  saveState(gameId);
}

/* ════════════════════════════════════════
   SAVE / LOAD
════════════════════════════════════════ */
function getSnapshots(){
  try{return JSON.parse(localStorage.getItem(SNAPSHOTS_KEY))||[];}
  catch{return[];}
}
function putSnapshots(snaps){try{localStorage.setItem(SNAPSHOTS_KEY,JSON.stringify(snaps));}catch(_){}}

function saveState(triggerGameId){
  try{localStorage.setItem(LIVE_KEY,JSON.stringify(STATE));}catch(_){}
  // Build snapshot key
  const gamesPlayed=STATE.games.filter(g=>g.confirmed).length;
  const now=Date.now();
  const d=new Date(now);
  const pad=n=>String(n).padStart(2,'0');
  const ts=`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
  const key=`${STATE.players.length}p_${gamesPlayed}g_${ts}`;
  const snap={
    key,savedAt:now,round:STATE.currentRound,
    gamesPlayed,totalGames:STATE.games.filter(g=>g.round===STATE.currentRound).length,
    playerNames:STATE.players.map(p=>({name:p.name,code:p.countryCode})),
    state:JSON.parse(JSON.stringify(STATE)),
  };
  const snaps=getSnapshots();
  snaps.unshift(snap);
  if(snaps.length>MAX_SAVES)snaps.length=MAX_SAVES;
  putSnapshots(snaps);
  currentSaveKey=key;
  updateSaveBadge();
  if(document.getElementById('history-panel').classList.contains('open'))renderHistoryList();
}

function updateSaveBadge(){
  const badge=document.getElementById('save-badge');
  if(badge)badge.textContent=getSnapshots().length;
}

function loadSnapshot(snap){
  if(!confirm(`Load save "${snap.key}"?\nCurrent progress will be replaced.`))return;
  Object.keys(STATE).forEach(k=>delete STATE[k]);
  Object.assign(STATE,JSON.parse(JSON.stringify(snap.state)));
  currentSaveKey=snap.key;
  renderSchedule();
  renderStandings();
  renderStats();
  closeHistory();
}

/* ════════════════════════════════════════
   HISTORY PANEL
════════════════════════════════════════ */
function openHistory(){
  renderHistoryList();
  document.getElementById('history-overlay').classList.add('open');
  document.getElementById('history-panel').classList.add('open');
}
function closeHistory(){
  document.getElementById('history-overlay').classList.remove('open');
  document.getElementById('history-panel').classList.remove('open');
}
function renderHistoryList(){
  const list=document.getElementById('history-list');
  const snaps=getSnapshots();
  if(!snaps.length){list.innerHTML='<div class="history-empty">No saves yet — scores are saved automatically.</div>';return;}
  list.innerHTML=snaps.map((s,i)=>{
    const isCurrent=s.key===currentSaveKey;
    return`<div class="save-item${isCurrent?' current-save':''}">
      <div class="save-item-header">
        <span class="save-key">${s.key}</span>
        <span class="save-time">${fmtTime(s.savedAt)}</span>
      </div>
      <div class="save-players">
        ${s.playerNames.map(p=>`<span class="save-player-chip"><img src="${flagSrc(p.code)}" alt="" onerror="this.style.opacity='0'"/>${p.name}</span>`).join('')}
      </div>
      <div class="save-actions">
        <button class="btn-delete-save" data-idx="${i}">Delete</button>
        <button class="btn-load-save" data-idx="${i}">Load</button>
      </div>
    </div>`;
  }).join('');
}

/* ════════════════════════════════════════
   SETUP RENDER
════════════════════════════════════════ */
function renderSetup(){
  const list=document.getElementById('player-list');
  list.innerHTML='';
  STATE.players.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='player-card';
    card.dataset.playerId=p.id;
    card.innerHTML=`
      <span class="player-num">${i+1}</span>
      <div class="flag-preview"><img src="${flagSrc(p.countryCode)}" alt="" onerror="this.style.opacity='0'"/></div>
      <input class="player-name-input" type="text" placeholder="Player name" value="${p.name}" data-player="${p.id}" maxlength="10" />
      <div class="nat-selector" data-player="${p.id}">
        <button class="nat-toggle">
          <img class="nat-flag-sm" src="${flagSrc(p.countryCode)}" alt="" onerror="this.style.opacity='0'"/>
          <span class="nat-name-label${p.countryCode?' selected':''}">${p.countryName||'Select nation…'}</span>
          <span class="nat-chevron">▼</span>
        </button>
        <div class="nat-dropdown">
          <input class="nat-search-input" type="text" placeholder="Search…" />
          <ul class="nat-list"></ul>
        </div>
      </div>
      <button class="btn-remove" data-player="${p.id}" ${STATE.players.length<=4?'disabled':''}>✕</button>
    `;
    list.appendChild(card);
    buildNatList(card.querySelector('.nat-list'));
    bindNatSelector(card.querySelector('.nat-selector'),p.id);
  });
  updateAddRemoveButtons();
  updatePlayerCountNote();
}

function buildNatList(ul){
  ul.innerHTML='';
  const addLi=(c,isDivider)=>{
    const li=document.createElement('li');
    if(isDivider){li.className='divider';li.textContent=c;li.setAttribute('aria-hidden','true');}
    else{
      li.dataset.code=c.code;li.dataset.name=c.name;
      li.innerHTML=`<img src="${flagSrc(c.code)}" alt="" onerror="this.style.opacity='0'"/>${c.name}`;
    }
    ul.appendChild(li);
  };
  addLi('Your Group',true);
  PINNED_NATIONS.forEach(c=>addLi(c));
  addLi('Popular Nations',true);
  TOP_NATIONS.forEach(c=>{if(!PINNED_NATIONS.find(p=>p.code===c.code))addLi(c);});
  addLi('All Nations',true);
  ALL_NATIONS.forEach(c=>{
    if(!TOP_NATIONS.find(t=>t.code===c.code)&&!PINNED_NATIONS.find(p=>p.code===c.code))addLi(c);
  });
}

function bindNatSelector(selectorEl,playerId){
  const toggle=selectorEl.querySelector('.nat-toggle');
  const dropdown=selectorEl.querySelector('.nat-dropdown');
  const search=selectorEl.querySelector('.nat-search-input');
  const ul=selectorEl.querySelector('.nat-list');

  toggle.addEventListener('click',e=>{
    e.stopPropagation();
    const open=dropdown.classList.contains('open');
    document.querySelectorAll('.nat-dropdown.open').forEach(d=>{d.classList.remove('open');d.previousElementSibling.classList.remove('open');});
    if(!open){dropdown.classList.add('open');toggle.classList.add('open');search.value='';filterList('');search.focus();}
  });

  function filterList(q){
    let hi=null;
    ul.querySelectorAll('li:not(.divider)').forEach(li=>{
      const match=li.dataset.name.toLowerCase().includes(q.toLowerCase());
      li.style.display=match?'':'none';
      if(match&&!hi)hi=li;
    });
    ul.querySelectorAll('li.divider').forEach(div=>{
      const next=div.nextElementSibling;
      div.style.display=(next&&next.style.display!=='none')?'':'none';
    });
  }

  search.addEventListener('input',()=>filterList(search.value));

  let highlightedIdx=-1;
  search.addEventListener('keydown',e=>{
    const visible=[...ul.querySelectorAll('li:not(.divider)')].filter(li=>li.style.display!=='none');
    if(e.key==='ArrowDown'){e.preventDefault();highlightedIdx=Math.min(highlightedIdx+1,visible.length-1);}
    else if(e.key==='ArrowUp'){e.preventDefault();highlightedIdx=Math.max(highlightedIdx-1,0);}
    else if(e.key==='Enter'&&highlightedIdx>=0){e.preventDefault();visible[highlightedIdx].click();return;}
    else if(e.key==='Escape'){closeDropdown();return;}
    visible.forEach((li,i)=>li.classList.toggle('highlighted',i===highlightedIdx));
    if(visible[highlightedIdx])visible[highlightedIdx].scrollIntoView({block:'nearest'});
  });

  ul.addEventListener('click',e=>{
    const li=e.target.closest('li:not(.divider)');
    if(!li)return;
    selectNation(playerId,li.dataset.code,li.dataset.name);
    closeDropdown();
  });

  function closeDropdown(){dropdown.classList.remove('open');toggle.classList.remove('open');}
}

function selectNation(playerId,code,name){
  const p=STATE.players.find(pl=>pl.id===playerId);
  if(!p)return;
  p.countryCode=code;p.countryName=name;
  // Update card UI
  const card=document.querySelector(`.player-card[data-player-id="${playerId}"]`);
  if(!card)return;
  card.querySelectorAll('.nat-flag-sm,.flag-preview img').forEach(img=>{img.src=flagSrc(code);img.style.opacity='1';});
  const label=card.querySelector('.nat-name-label');
  if(label){label.textContent=name;label.classList.add('selected');}
  const toggle=card.querySelector('.nat-toggle');
  if(toggle)toggle.classList.remove('error');
}

function updateAddRemoveButtons(){
  document.getElementById('btn-add-player').disabled=STATE.players.length>=8;
  document.querySelectorAll('.btn-remove').forEach(b=>b.disabled=STATE.players.length<=4);
}

function updatePlayerCountNote(){
  const n=STATE.players.length;
  const games=n>=4?3*comb(n,4):0;
  const note=document.getElementById('player-count-note');
  if(!note)return;
  note.className='player-count-note'+(n>=7?' warn':'');
  if(n<4){note.textContent=`Need at least 4 players for 2v2.`;return;}
  note.textContent=`${n} players → ${games} games per round${n>=7?' (long session!)':''}`;
}

function comb(n,k){
  if(k>n)return 0;
  let r=1;for(let i=0;i<k;i++)r=r*(n-i)/(i+1);
  return Math.round(r);
}

/* ════════════════════════════════════════
   SCREEN SWITCH
════════════════════════════════════════ */
function showScreen(name){document.body.dataset.screen=name;}

/* ════════════════════════════════════════
   TAB SWITCH
════════════════════════════════════════ */
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('.tab-panel').forEach(p=>{
    const matches=p.id===`tab-${name}`;
    p.classList.toggle('active',matches);
  });
}

/* ════════════════════════════════════════
   EVENT LISTENERS
════════════════════════════════════════ */
// Close dropdowns on outside click
document.addEventListener('click',()=>{
  document.querySelectorAll('.nat-dropdown.open').forEach(d=>{
    d.classList.remove('open');
    d.previousElementSibling.classList.remove('open');
  });
});

// Add player
document.getElementById('btn-add-player').addEventListener('click',()=>{
  if(STATE.players.length>=8)return;
  STATE.players.push({id:uid(),name:'',countryCode:'',countryName:''});
  renderSetup();
});

// Player name input
document.getElementById('player-list').addEventListener('input',e=>{
  const input=e.target.closest('.player-name-input');
  if(!input)return;
  const pos=input.selectionStart;
  const cleaned=input.value.replace(/[^a-zA-Z0-9 ]/g,'').slice(0,10);
  if(input.value!==cleaned){input.value=cleaned;input.setSelectionRange(pos,pos);}
  const pid=input.dataset.player;
  const p=STATE.players.find(pl=>pl.id===pid);
  if(p){p.name=cleaned;input.classList.remove('error');}
});

// Remove player
document.getElementById('player-list').addEventListener('click',e=>{
  const btn=e.target.closest('.btn-remove');
  if(!btn)return;
  const pid=btn.dataset.player;
  STATE.players=STATE.players.filter(p=>p.id!==pid);
  renderSetup();
});

// Generate tournament
document.getElementById('btn-generate').addEventListener('click',()=>{
  let valid=true;
  STATE.players.forEach(p=>{
    const card=document.querySelector(`.player-card[data-player-id="${p.id}"]`);
    if(!p.name.trim()){
      card&&card.querySelector('.player-name-input').classList.add('error');
      valid=false;
    }
    if(!p.countryCode){
      card&&card.querySelector('.nat-toggle').classList.add('error');
      valid=false;
    }
  });
  if(!valid)return;
  STATE.games=generateSchedule(1);
  STATE.currentRound=1;
  STATE.createdAt=Date.now();
  showScreen('tournament');
  renderSchedule();
  renderStandings();
  renderStats();
  saveState();
});

// Tab switching
document.querySelector('.tab-bar').addEventListener('click',e=>{
  const btn=e.target.closest('.tab-btn');
  if(!btn)return;
  switchTab(btn.dataset.tab);
});

// Score buttons & OT & zero-confirm (delegated on whole tournament panel)
document.getElementById('screen-tournament').addEventListener('click',e=>{
  // Score btn
  const sBtn=e.target.closest('.s-btn[data-delta]');
  if(sBtn){handleScore(sBtn.dataset.game,sBtn.dataset.side,+sBtn.dataset.delta);return;}
  // OT
  const otBadge=e.target.closest('.ot-badge[data-action="ot"]');
  if(otBadge){handleOT(otBadge.dataset.game);return;}
  // Zero confirm via s-sep
  const sep=e.target.closest('.s-sep.confirmmable');
  if(sep){handleConfirmZero(sep.dataset.game);return;}
});

// Final scores → table tab
document.getElementById('btn-final-scores').addEventListener('click',()=>{
  switchTab('table');
  document.getElementById('tab-table').scrollIntoView({behavior:'smooth',block:'start'});
});

// Next round
document.getElementById('btn-next-round').addEventListener('click',()=>{
  STATE.currentRound++;
  const newGames=generateSchedule(STATE.currentRound);
  STATE.games.push(...newGames);
  appendRoundBlock(STATE.currentRound);
  checkRoundComplete();
  saveState();
});

// PDF export
document.getElementById('btn-pdf').addEventListener('click',()=>window.print());

// New tournament
document.getElementById('btn-new-tournament').addEventListener('click',()=>{
  if(!confirm('Start a new tournament? All current progress will be lost.'))return;
  STATE.players=[];STATE.games=[];STATE.currentRound=1;STATE.createdAt=null;
  currentSaveKey=null;
  showScreen('setup');
  STATE.players=[
    {id:uid(),name:'',countryCode:'',countryName:''},
    {id:uid(),name:'',countryCode:'',countryName:''},
    {id:uid(),name:'',countryCode:'',countryName:''},
    {id:uid(),name:'',countryCode:'',countryName:''},
    {id:uid(),name:'',countryCode:'',countryName:''},
  ];
  renderSetup();
});

// History panel
document.getElementById('btn-history').addEventListener('click',openHistory);
document.getElementById('btn-close-history').addEventListener('click',closeHistory);
document.getElementById('history-overlay').addEventListener('click',closeHistory);
function clearAllSaves(){
  if(!confirm('Delete all saves?'))return;
  putSnapshots([]);currentSaveKey=null;updateSaveBadge();renderHistoryList();
}
document.getElementById('btn-clear-saves').addEventListener('click',clearAllSaves);
document.getElementById('btn-delete-all-saves').addEventListener('click',clearAllSaves);
document.getElementById('history-list').addEventListener('click',e=>{
  const loadBtn=e.target.closest('.btn-load-save');
  if(loadBtn){const snaps=getSnapshots();loadSnapshot(snaps[+loadBtn.dataset.idx]);return;}
  const delBtn=e.target.closest('.btn-delete-save');
  if(delBtn){
    const snaps=getSnapshots();snaps.splice(+delBtn.dataset.idx,1);
    putSnapshots(snaps);updateSaveBadge();renderHistoryList();
  }
});

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
(function init(){
  updateSaveBadge();
  try{
    const live=localStorage.getItem(LIVE_KEY);
    if(live){
      const saved=JSON.parse(live);
      if(saved.players&&saved.players.length&&saved.games&&saved.games.length){
        Object.assign(STATE,saved);
        showScreen('tournament');
        renderSchedule();
        renderStandings();
        renderStats();
        // restore currentSaveKey
        const snaps=getSnapshots();
        if(snaps.length)currentSaveKey=snaps[0].key;
        return;
      }
    }
  }catch(e){try{localStorage.removeItem(LIVE_KEY);}catch(_){}}
  // Fresh start
  STATE.players=[
    {id:uid(),name:'',countryCode:'',countryName:''},
    {id:uid(),name:'',countryCode:'',countryName:''},
    {id:uid(),name:'',countryCode:'',countryName:''},
    {id:uid(),name:'',countryCode:'',countryName:''},
    {id:uid(),name:'',countryCode:'',countryName:''},
  ];
  renderSetup();
})();
</script>
